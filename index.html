<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azar Concurrente - Experimento Rayuela</title>
    <script src="[https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js](https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js)"></script>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            overflow: hidden;
        }
        header h1 {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #444444;
            margin-bottom: 40px;
            transition: color 1s ease;
        }
        .canvas {
            max-width: 700px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        #texto-poema {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 60px;
            color: #a0a0a0;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: justify;
        }
        #btn-disparar {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 15px 30px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 3px;
            max-width: 280px;
            width: 100%;
            margin: 0 auto;
            opacity: 0.3;
            pointer-events: none;
        }
        body.listo header h1 { color: #ffffff; }
        body.listo #btn-disparar { border-color: #ffffff; opacity: 1; pointer-events: auto; }
        body.listo #btn-disparar:hover { background-color: #ffffff; color: #000000; }
    </style>
</head>
<body>

    <header>
        <h1>Azar Concurrente</h1>
    </header>

    <div class="canvas">
        <div id="texto-poema">Desmantelando la novela...</div>
        <button id="btn-disparar">Lanzar Fragmento</button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = '[https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js](https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js)';

        let fragmentosLibro = [];

        async function cargarNovelaOriginal() {
            try {
                const respuesta = await fetch('rayuela.pdf');
                if (!respuesta.ok) throw new Error("Error al buscar el PDF");
                
                const data = await respuesta.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: data }).promise;
                let textoBruto = "";

                // Absorbe desde la página 12
                for (let i = 12; i <= pdf.numPages; i++) {
                    const pagina = await pdf.getPage(i);
                    const contenido = await pagina.getTextContent();
                    textoBruto += contenido.items.map(item => item.str).join(" ") + " ";
                }

                // Cortamos bloques fijos de texto (no oraciones completas) para asegurar la ruptura sintáctica
                // Rompe el texto en bloques puros de 120 caracteres
                const tamañoBloque = 120;
                for (let i = 0; i < textoBruto.length; i += tamañoBloque) {
                    let bloque = textoBruto.substr(i, tamañoBloque).trim();
                    if (bloque.length > 40 && !/^\d+$/.test(bloque)) {
                        fragmentosLibro.push(bloque);
                    }
                }

                document.body.classList.add('listo');
                document.getElementById('texto-poema').textContent = "El libro ha sido desmantelado. Provocá la concurrencia.";

            } catch (error) {
                console.error(error);
                document.getElementById('texto-poema').textContent = "Error al procesar el archivo.";
            }
        }

        function hibridarTexto() {
            if (fragmentosLibro.length < 2) return;

            // Elegimos dos bloques de cualquier lugar del PDF
            let b1 = fragmentosLibro[Math.floor(Math.random() * fragmentosLibro.length)];
            let b2 = fragmentosLibro[Math.floor(Math.random() * fragmentosLibro.length)];

            // Tijeretazo ciego: primera mitad de uno, segunda mitad del otro
            let mitad1 = b1.substring(0, Math.floor(b1.length / 2));
            let mitad2 = b2.substring(Math.floor(b2.length / 2));

            let resultado = (mitad1 + " " + mitad2).trim();
            
            // Limpieza visual rápida
            resultado = resultado.charAt(0).toUpperCase() + resultado.slice(1);

            const el = document.getElementById('texto-poema');
            el.style.color = "#ffffff";
            el.textContent = `"${resultado}"`;
        }

        document.getElementById('btn-disparar').addEventListener('click', hibridarTexto);
        window.addEventListener('DOMContentLoaded', cargarNovelaOriginal);
    </script>
</body>
</html>
