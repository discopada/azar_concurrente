<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azar Concurrente - Experimento Rayuela</title>
    <!-- Motor PDF.js para leer el archivo real desde el servidor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        /* Estética Nocturna, Minimalista y Radical */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            overflow: hidden;
        }

        header h1 {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #444444; /* Apagado al inicio */
            margin-bottom: 40px;
            transition: color 1s ease;
        }

        .canvas {
            max-width: 700px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        #texto-poema {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 60px;
            color: #a0a0a0;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: justify;
            text-justify: inter-word;
            transition: color 0.3s ease;
        }

        #btn-disparar {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 15px 30px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 3px;
            max-width: 280px;
            width: 100%;
            margin: 0 auto;
            transition: all 0.3s ease;
            opacity: 0.3;
            pointer-events: none; /* Bloqueado hasta que cargue el PDF */
        }

        /* Cuando el sistema está listo */
        body.listo header h1 {
            color: #ffffff;
        }

        body.listo #btn-disparar {
            border-color: #ffffff;
            opacity: 1;
            pointer-events: auto;
        }

        body.listo #btn-disparar:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="titulo">Azar Concurrente</h1>
    </header>

    <div class="canvas">
        <div id="texto-poema">Procesando el archivo de la novela...</div>
        <button id="btn-disparar">Lanzar Fragmento</button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let fragmentosLibro = [];

        const elementoTexto = document.getElementById('texto-poema');
        const btnDisparar = document.getElementById('btn-disparar');

        async function cargarNovelaOriginal() {
            try {
                const respuesta = await fetch('rayuela.pdf');
                if (!respuesta.ok) throw new Error("No se encontró el archivo.");
                
                const data = await respuesta.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: data }).promise;
                let textoBruto = "";

                // Absorbe de la página 12 hasta el final de la novela en una base única masiva
                for (let i = 12; i <= pdf.numPages; i++) {
                    const pagina = await pdf.getPage(i);
                    const contenido = await pagina.getTextContent();
                    const lineas = contenido.items.map(item => item.str);
                    textoBruto += lineas.join(" ") + " ";
                }

                // Desguaza el libro completo separando por puntos
                fragmentosLibro = textoBruto
                    .split(/(?<=[.!?])\s+/)
                    .map(f => f.trim())
                    // Purga líneas huérfanas, números de página e índices
                    .filter(f => f.length > 40 && !/^\d+$/.test(f) && !f.includes('http'));

                document.body.classList.add('listo');
                elementoTexto.textContent = "El libro ha sido desmantelado. Provocá la concurrencia.";

            } catch (error) {
                console.error(error);
                elementoTexto.textContent = "Error al procesar el PDF.";
            }
        }

        // Intercalado absoluto y trans-página
        function intercalarFragmentos() {
            if (fragmentosLibro.length < 2) return;

            // Elegimos dos enunciados de CUALQUIER lugar del libro al azar
            let indexA = Math.floor(Math.random() * fragmentosLibro.length);
            let indexB;
            
            // Forzamos que la segunda frase sea distinta para garantizar la mutación
            do {
                indexB = Math.floor(Math.random() * fragmentosLibro.length);
            } while (indexA === indexB);

            let fraseA = fragmentosLibro[indexA];
            let fraseB = fragmentosLibro[indexB];

            let palabrasA = fraseA.split(" ");
            let palabrasB = fraseB.split(" ");

            // Si alguna es críticamente corta, reintentamos el disparo de forma transparente
            if (palabrasA.length < 5 || palabrasB.length < 5) {
                intercalarFragmentos();
                return;
            }

            // Quiebre dinámico: Corta cerca de la mitad de la primera frase
            let mitadA = Math.floor(palabrasA.length / 2);
            let inicioHibrido = palabrasA.slice(0, mitadA).join(" ");

            // Quiebre dinámico: Toma la segunda mitad de la otra frase (de otra página)
            let mitadB = Math.floor(palabrasB.length / 2);
            let finalHibrido = palabrasB.slice(mitadB).join(" ");

            // Ensamblaje molecular
            let textoMutado = `${inicioHibrido} ${finalHibrido}`;

            // Limpieza ortotipográfica de cicatrices del choque de textos
            textoMutado = textoMutado.replace(/\s+([,.:;!?])/g, '$1');

            // Aseguramos que empiece con mayúscula por si la segunda mitad arrastró cosas raras
            textoMutado = textoMutado.charAt(0).toUpperCase() + textoMutado.slice(1);

            elementoTexto.style.color = "#ffffff";
            elementoTexto.textContent = `"${textoMutado}"`;
        }

        btnDisparar.addEventListener('click', intercalarFragmentos);
        window.addEventListener('DOMContentLoaded', cargarNovelaOriginal);
    </script>
</body>
</html>
