<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azar Concurrente - Experimento Rayuela</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
            overflow: hidden;
        }
        header h1 {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #444444;
            margin-bottom: 40px;
            transition: color 1s ease;
        }
        .canvas {
            max-width: 700px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        #texto-poema {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 60px;
            color: #a0a0a0;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: justify;
        }
        #btn-disparar {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #333333;
            padding: 15px 30px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 3px;
            max-width: 280px;
            width: 100%;
            margin: 0 auto;
            opacity: 0.3;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        body.listo header h1 { color: #ffffff; }
        body.listo #btn-disparar { border-color: #ffffff; opacity: 1; pointer-events: auto; }
        body.listo #btn-disparar:hover { background-color: #ffffff; color: #000000; }
    </style>
</head>
<body>

    <header>
        <h1>Azar Concurrente</h1>
    </header>

    <div class="canvas">
        <div id="texto-poema">Desmantelando la novela...</div>
        <button id="btn-disparar">Lanzar Fragmento</button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        let oracionesMundo = [];

        async function cargarNovelaOriginal() {
            try {
                const respuesta = await fetch('rayuela.pdf');
                if (!respuesta.ok) throw new Error("No se encontró el PDF");
                
                const data = await respuesta.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: data }).promise;
                let textoCompleto = "";

                // Lee establemente desde la página 12 hasta el final
                for (let i = 12; i <= pdf.numPages; i++) {
                    try {
                        const pagina = await pdf.getPage(i);
                        const contenido = await pagina.getTextContent();
                        textoCompleto += contenido.items.map(item => item.str).join(" ") + " ";
                    } catch (e) {
                        // Si alguna página del PDF tiene un error visual interno, la salta y sigue
                        continue;
                    }
                }

                // Separación limpia por estructuras de puntuación reales
                oracionesMundo = textoCompleto
                    .split(/(?<=[.!?])\s+/)
                    .map(o => o.trim())
                    .filter(o => o.length > 35 && !/^\d+$/.test(o) && !o.includes('http'));

                document.body.classList.add('listo');
                document.getElementById('texto-poema').textContent = "El libro ha sido desmantelado. Provocá la concurrencia.";

            } catch (error) {
                console.error(error);
                document.getElementById('texto-poema').textContent = "Error al procesar el archivo. Verificá que 'rayuela.pdf' exista.";
            }
        }

        function cruzarMitades() {
            if (oracionesMundo.length < 2) return;

            // Elegimos dos oraciones completamente aleatorias (pueden ser de la pág 15 y de la 400)
            let o1 = oracionesMundo[Math.floor(Math.random() * oracionesMundo.length)];
            let o2 = oracionesMundo[Math.floor(Math.random() * oracionesMundo.length)];

            let palA = o1.split(" ");
            let palB = o2.split(" ");

            // Si son textos demasiado secos, volvemos a intentar automáticamente
            if (palA.length < 6 || palB.length < 6) {
                cruzarMitades();
                return;
            }

            // Partimos la primera oración por palabras y agarramos la primera mitad
            let corteA = Math.floor(palA.length / 2);
            let mitadInicio = palA.slice(0, corteA).join(" ");

            // Partimos la segunda oración y nos quedamos con la segunda mitad
            let corteB = Math.floor(palB.length / 2);
            let mitadFinal = palB.slice(corteB).join(" ");

            // Encastre híbrido
            let oracionMutada = `${mitadInicio} ${mitadFinal}`.trim();

            // Parche ortográfico rápido para que no queden espacios colgados antes de una coma
            oracionMutada = oracionMutada.replace(/\s+([,.:;!?])/g, '$1');
            oracionMutada = oracionMutada.charAt(0).toUpperCase() + oracionMutada.slice(1);

            const cajaTexto = document.getElementById('texto-poema');
            cajaTexto.style.color = "#ffffff";
            cajaTexto.textContent = `"${oracionMutada}"`;
        }

        document.getElementById('btn-disparar').addEventListener('click', cruzarMitades);
        window.addEventListener('DOMContentLoaded', cargarNovelaOriginal);
    </script>
</body>
</html>
